<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NonBor - Qo'llanma</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f5f5f5;
            font-size: 14px;
            color: #333;
        }
        .container {
            max-width: 700px;
            margin: auto;
            padding: 15px;
        }
        img.logo {
            width: 100px;
            margin: 15px auto;
            display: block;
        }
        h2 {
            margin-top: 20px;
            font-size: 16px;
            color: #333;
        }

        /* Tugmalar */
        .btn {
            display: block;
            margin: 6px auto;
            padding: 10px;
            width: 80%;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s, opacity 0.2s;
        }
        .btn:hover { transform: scale(1.02); opacity: 0.9; }
        .pdf { background: #dc3545; color: #fff; }
        .video { background: #007bff; color: #fff; }
        .instagram { background: linear-gradient(45deg,#f58529,#dd2a7b,#8134af,#515bd4); color: #fff; }
        .survey { background: #007bff; color: #fff; }
        .contact {
            margin-top: 10px;
            background: #FF6833;
            color: black;
            padding: 15px;
            border-radius: 10px;
            display: inline-block;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
        }

        /* Store */
        .store-container {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            gap: 10px;
        }
        .store-box {
            flex: 1;
            background: #fff;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
        }
        .store-box img { width: 120px; margin-bottom: 10px; }
        .store-box a {
            display: block;
            margin: 5px 0;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            color: #fff;
            background: #28a745;
        }

        /* ===== VIDEO SECTION ===== */
        .video-section {
            margin-top: 24px;
            text-align: left;
        }
        .category-label {
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 1px;
            margin: 18px 0 8px 4px;
            text-align: left;
        }
        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .video-card {
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: #333;
            display: block;
        }
        .video-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(0,0,0,0.14);
        }
        .video-thumb {
            position: relative;
            padding-top: 56.25%;
            background: #e9ecef;
            overflow: hidden;
        }
        .video-thumb img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .play-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.2);
            transition: background 0.2s;
        }
        .video-card:hover .play-overlay {
            background: rgba(0,0,0,0.35);
        }
        .play-circle {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.92);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .play-circle svg {
            width: 18px; height: 18px;
            fill: #007bff;
            margin-left: 2px;
        }
        .video-info {
            padding: 8px 10px;
        }
        .video-title {
            font-size: 13px;
            font-weight: bold;
            line-height: 1.3;
            margin-bottom: 2px;
        }
        .video-desc {
            font-size: 11px;
            color: #888;
            line-height: 1.3;
        }
        .attachment-btn {
            display: inline-block;
            margin: 4px 8px 8px;
            padding: 4px 10px;
            border-radius: 6px;
            background: #f0f0f0;
            color: #555;
            font-size: 11px;
            text-decoration: none;
        }
        .attachment-btn:hover { background: #e0e0e0; }

        /* Loading & empty */
        .loading {
            text-align: center;
            padding: 30px;
            color: #888;
        }
        .spinner {
            display: inline-block;
            width: 28px; height: 28px;
            border: 3px solid #e9ecef;
            border-top-color: #007bff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            width: 100%;
            max-width: 640px;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
        }
        .modal-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            border-bottom: 1px solid #eee;
        }
        .modal-top h3 { font-size: 15px; margin: 0; }
        .modal-close {
            width: 30px; height: 30px;
            border-radius: 50%;
            border: none;
            background: #f0f0f0;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-close:hover { background: #e0e0e0; }
        .modal-video {
            position: relative;
            padding-top: 56.25%;
        }
        .modal-video iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }

        @media (max-width: 480px) {
            .video-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
            .video-title { font-size: 12px; }
            .video-info { padding: 6px 8px; }
            .container { padding: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://raw.githubusercontent.com/Ikhtiyor-s/Nonbor/main/nonbor_logo.png" alt="NonBor Logo" class="logo">

    <!-- Sotuvchi qo'llanmasi -->
    <h2>📘 Sotuvchi qo'llanmasi</h2>

    <!-- VIDEO DARSLIKLAR -->
    <div class="video-section" id="videoSection">
        <div class="loading" id="videoLoading">
            <div class="spinner"></div>
            <p style="margin-top: 8px;">Videolar yuklanmoqda...</p>
        </div>
    </div>

    <!-- Ilovani yuklash -->
    <h2>⬇️ Ilovani yuklab olish</h2>
    <div class="store-container">
        <div class="store-box">
            <img src="https://raw.githubusercontent.com/Ikhtiyor-s/Nonbor/main/appstore.png" alt="App Store">
            <a href="https://apps.apple.com/app/id6743842538" target="_blank">📱 Sotuvchi ilova</a>
            <a href="https://apps.apple.com/app/id6743315956" target="_blank">📱 Mijoz ilova</a>
        </div>
        <div class="store-box">
            <img src="https://raw.githubusercontent.com/Ikhtiyor-s/Nonbor/main/playmarket.png" alt="Play Market">
            <a href="https://play.google.com/store/apps/details?id=uz.welltech.nonborbusiness" target="_blank">📱 Sotuvchi ilova</a>
            <a href="https://play.google.com/store/apps/details?id=uz.welltech.nonbor.nonboruz" target="_blank">📱 Mijoz ilova</a>
        </div>
    </div>

    <div style="margin-top: 14px;">
        <a href="tel:+998948679300" class="contact">📲 Murojaat 1</a>
        <a href="tel:+998909564222" class="contact">📲 Murojaat 2</a>
    </div>
</div>

<!-- Video Modal -->
<div class="modal-overlay" id="videoModal">
    <div class="modal-box">
        <div class="modal-top">
            <h3 id="modalTitle">Video</h3>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-video">
            <iframe id="modalFrame" allowfullscreen></iframe>
        </div>
    </div>
</div>

<script>
function getYouTubeId(url) {
    const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|shorts\/))([^?&/#]+)/);
    return m ? m[1] : null;
}

function getThumb(url) {
    const id = getYouTubeId(url);
    return id ? 'https://img.youtube.com/vi/' + id + '/mqdefault.jpg' : '';
}

function openModal(title, url) {
    const id = getYouTubeId(url);
    if (!id) { window.open(url, '_blank'); return; }
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalFrame').src = 'https://www.youtube.com/embed/' + id + '?autoplay=1';
    document.getElementById('videoModal').classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('videoModal').classList.remove('active');
    document.getElementById('modalFrame').src = '';
    document.body.style.overflow = '';
}

document.getElementById('videoModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
});

function renderVideos(categories, videos) {
    const section = document.getElementById('videoSection');
    const loading = document.getElementById('videoLoading');

    const activeCats = categories.filter(c => c.is_active).sort((a, b) => a.sort_order - b.sort_order);
    const activeVideos = videos.filter(v => v.is_active);

    if (activeVideos.length === 0) { loading.innerHTML = ''; return; }

    const grouped = {};
    activeVideos.forEach(v => {
        const cat = v.category || 'boshqa';
        if (!grouped[cat]) grouped[cat] = [];
        grouped[cat].push(v);
    });

    let html = '';
    activeCats.forEach(cat => {
        if (!grouped[cat.slug]) return;
        const items = grouped[cat.slug].sort((a, b) => a.sort_order - b.sort_order);
        const label = (cat.emoji ? cat.emoji + ' ' : '') + cat.name;

        html += '<div class="category-label">' + label + '</div>';
        html += '<div class="video-grid">';
        items.forEach(v => {
            const thumb = getThumb(v.video_url);
            const attachIcon = v.attachment_url
                ? (v.attachment_url.match(/\.(jpg|jpeg|png|webp|gif)$/i) ? '🖼' : '📄')
                : '';
            html += '<a class="video-card" href="javascript:void(0)" onclick="openModal(\'' +
                v.title.replace(/'/g, "\\'") + "', '" + v.video_url.replace(/'/g, "\\'") + "')\">" +
                '<div class="video-thumb">' +
                (thumb ? '<img src="' + thumb + '" alt="' + v.title + '">' : '') +
                '<div class="play-overlay"><div class="play-circle">' +
                '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>' +
                '</div></div></div>' +
                '<div class="video-info">' +
                '<div class="video-title">' + v.title + '</div>' +
                (v.description ? '<div class="video-desc">' + v.description + '</div>' : '') +
                '</div>' +
                (v.attachment_url
                    ? '<a class="attachment-btn" href="' + v.attachment_url + '" target="_blank" onclick="event.stopPropagation()">' + attachIcon + ' Qo\'llanma</a>'
                    : '') +
                '</a>';
        });
        html += '</div>';
    });

    if (loading) loading.remove();
    section.innerHTML += html;
}

async function loadVideos() {
    const loading = document.getElementById('videoLoading');
    try {
        // Statik data.json faylidan o'qish (CORS muammosi yo'q)
        const resp = await fetch('./data.json?v=' + Date.now());
        if (!resp.ok) throw new Error('data.json topilmadi');
        const data = await resp.json();
        renderVideos(data.categories || [], data.videos || []);
    } catch (err) {
        if (loading) loading.innerHTML = '';
        console.log('data.json mavjud emas:', err.message);
    }
}

loadVideos();
</script>

</body>
</html>
