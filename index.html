<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nonbor</title>
  <meta name="description" content="Nonbor — Telegram bot platformasi" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: #0A0F1E;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 48px;
    }
    body::before {
      content: '';
      position: fixed;
      top: -40%; left: -20%;
      width: 80vw; height: 80vw;
      background: radial-gradient(circle, rgba(14,165,233,0.12) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      animation: pulse 8s ease-in-out infinite;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -40%; right: -20%;
      width: 70vw; height: 70vw;
      background: radial-gradient(circle, rgba(99,102,241,0.1) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      animation: pulse 10s ease-in-out infinite reverse;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.7; }
    }
    .container { width: 100%; max-width: 480px; position: relative; z-index: 1; }

    /* Skeleton loader */
    .skeleton { background: linear-gradient(90deg, #1E293B 25%, #253148 50%, #1E293B 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* Profile */
    .profile { text-align: center; margin-bottom: 32px; animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .avatar {
      width: 88px; height: 88px; border-radius: 50%;
      background: linear-gradient(135deg, #0EA5E9, #6366F1);
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; margin: 0 auto 16px;
      box-shadow: 0 0 0 4px rgba(14,165,233,0.2), 0 8px 32px rgba(14,165,233,0.3);
    }
    .profile h1 { font-size: 26px; font-weight: 800; color: #F1F5F9; letter-spacing: -0.5px; }
    .profile p { font-size: 14px; color: #64748B; margin-top: 6px; line-height: 1.5; }
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(14,165,233,0.1); border: 1px solid rgba(14,165,233,0.2);
      color: #0EA5E9; font-size: 11px; font-weight: 600;
      padding: 3px 10px; border-radius: 20px; margin-top: 10px;
    }

    /* Divider */
    .divider { display: flex; align-items: center; gap: 10px; margin: 4px 0; }
    .divider span { font-size: 11px; color: #334155; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.06); }

    /* Link cards */
    .links { display: flex; flex-direction: column; gap: 10px; }
    .link-card {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px; border-radius: 16px;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.04);
      transition: all 0.2s ease;
      cursor: pointer;
      animation: fadeIn 0.4s ease both;
    }
    .link-card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.12); }
    .link-card:active { transform: translateY(0) scale(0.99); }
    .link-icon {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .link-info { flex: 1; min-width: 0; }
    .link-title { font-size: 14px; font-weight: 700; color: #F1F5F9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .link-sub { font-size: 12px; color: #64748B; margin-top: 2px; }
    .link-arrow { color: #334155; font-size: 18px; flex-shrink: 0; transition: color 0.2s, transform 0.2s; }
    .link-card:hover .link-arrow { color: #94A3B8; transform: translateX(3px); }

    /* Color themes */
    .blue   { --clr: #0EA5E9; } .green { --clr: #10B981; }
    .purple { --clr: #8B5CF6; } .yellow { --clr: #F59E0B; }
    .red    { --clr: #EF4444; } .gray  { --clr: #64748B; }
    .link-card { background: color-mix(in srgb, var(--clr, #0EA5E9) 8%, transparent); border-color: color-mix(in srgb, var(--clr, #0EA5E9) 20%, transparent); }
    .link-card:hover { border-color: color-mix(in srgb, var(--clr, #0EA5E9) 40%, transparent); box-shadow: 0 4px 24px color-mix(in srgb, var(--clr, #0EA5E9) 15%, transparent); }
    .link-icon { background: color-mix(in srgb, var(--clr, #0EA5E9) 18%, transparent); }

    /* Video embed */
    .video-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.85); z-index: 1000;
      align-items: center; justify-content: center;
      padding: 20px;
    }
    .video-modal.open { display: flex; }
    .video-wrap {
      width: 100%; max-width: 680px; border-radius: 16px;
      overflow: hidden; background: #000;
      position: relative;
    }
    .video-wrap iframe { width: 100%; aspect-ratio: 16/9; display: block; border: none; }
    .video-close {
      position: absolute; top: -40px; right: 0;
      color: #fff; font-size: 28px; cursor: pointer; line-height: 1;
      background: none; border: none; padding: 4px 8px;
    }

    .footer { text-align: center; margin-top: 28px; color: #1E293B; font-size: 12px; }
    .footer a { color: #334155; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <div id="app">
      <!-- Skeleton -->
      <div class="profile">
        <div class="skeleton" style="width:88px;height:88px;border-radius:50%;margin:0 auto 16px;"></div>
        <div class="skeleton" style="width:140px;height:22px;margin:0 auto 8px;"></div>
        <div class="skeleton" style="width:200px;height:14px;margin:0 auto;"></div>
      </div>
      <div class="links">
        <div class="skeleton" style="height:68px;border-radius:16px;"></div>
        <div class="skeleton" style="height:68px;border-radius:16px;"></div>
        <div class="skeleton" style="height:68px;border-radius:16px;"></div>
      </div>
    </div>
  </div>

  <!-- Video modal -->
  <div class="video-modal" id="videoModal" onclick="closeVideo(event)">
    <div class="video-wrap">
      <button class="video-close" onclick="closeVideo(null, true)">✕</button>
      <iframe id="videoFrame" src="" allowfullscreen allow="autoplay"></iframe>
    </div>
  </div>

  <script>
    // ─── Config ────────────────────────────────────────────────────────────────
    // Backendingiz URLini shu yerga yozing:
    const API_BASE = 'https://api.nonbor.uz';
    // Local dev uchun: const API_BASE = 'http://localhost:8080';

    // ─── Video embed ───────────────────────────────────────────────────────────
    function getYoutubeEmbed(url) {
      const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|shorts\/))([^?&\/#]+)/);
      return m ? `https://www.youtube.com/embed/${m[1]}?autoplay=1` : null;
    }
    function getDriveEmbed(url) {
      const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
      return m ? `https://drive.google.com/file/d/${m[1]}/preview` : null;
    }
    function openVideo(embedUrl) {
      document.getElementById('videoFrame').src = embedUrl;
      document.getElementById('videoModal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeVideo(e, force) {
      if (!force && e && e.target !== document.getElementById('videoModal')) return;
      document.getElementById('videoFrame').src = '';
      document.getElementById('videoModal').classList.remove('open');
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeVideo(null, true); });

    // ─── Build link URL ─────────────────────────────────────────────────────────
    function buildHref(link) {
      if (link.link_type === 'phone') return `tel:${link.url.replace(/\s/g, '')}`;
      return link.url;
    }

    // ─── Render ─────────────────────────────────────────────────────────────────
    function renderPage(profile, links) {
      // Update page title
      document.title = profile.name;

      // Group links by dividers (every 3 or by section)
      const linksHtml = links.map((l, i) => {
        const isVideo = l.link_type === 'youtube' || l.link_type === 'drive';
        const embedUrl = l.link_type === 'youtube' ? getYoutubeEmbed(l.url) :
                          l.link_type === 'drive' ? getDriveEmbed(l.url) : null;

        let onclick = '';
        let href = buildHref(l);
        if (isVideo && embedUrl) {
          onclick = `onclick="openVideo('${embedUrl.replace(/'/g,"\\'")}'); return false;"`;
          href = '#';
        }

        return `
          <a href="${href}" target="${isVideo ? '_self' : '_blank'}" rel="noopener noreferrer"
             class="link-card ${l.color_theme}" style="animation-delay:${i * 0.06}s" ${onclick}>
            <div class="link-icon">${l.emoji}</div>
            <div class="link-info">
              <div class="link-title">${l.title}</div>
              ${l.subtitle ? `<div class="link-sub">${l.subtitle}</div>` : ''}
            </div>
            <span class="link-arrow">›</span>
          </a>
        `;
      }).join('');

      document.getElementById('app').innerHTML = `
        <div class="profile">
          <div class="avatar">${profile.avatar_emoji}</div>
          <h1>${profile.name}</h1>
          <p>${profile.description}</p>
          <div class="badge"><span>●</span> ${profile.badge_text}</div>
        </div>
        <div class="links">${linksHtml}</div>
        <div class="footer">
          <a href="https://nonbor.uz/">nonbor.uz</a> · Barcha huquqlar himoyalangan
        </div>
      `;
    }

    // ─── Fetch data ─────────────────────────────────────────────────────────────
    async function loadBio() {
      try {
        const res = await fetch(`${API_BASE}/api/bio`, { signal: AbortSignal.timeout(8000) });
        if (!res.ok) throw new Error('API error');
        const data = await res.json();
        if (data.success) renderPage(data.profile, data.links);
      } catch (e) {
        // Fallback — static content
        renderPage(
          { name: 'Nonbor', description: 'Telegram bot platformasi', avatar_emoji: '🍽', badge_text: 'Faol' },
          [
            { emoji: '📱', title: 'Mijoz ilovasi', subtitle: 'nonbor.uz', url: 'https://nonbor.uz/', link_type: 'website', color_theme: 'green' },
            { emoji: '💼', title: 'Biznes panel', subtitle: 'business.nonbor.uz', url: 'https://business.nonbor.uz/', link_type: 'website', color_theme: 'yellow' },
          ]
        );
      }
    }

    loadBio();
  </script>
</body>
</html>
