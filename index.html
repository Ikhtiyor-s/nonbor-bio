<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NonBor - Qo'llanma</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f5f5f5;
            font-size: 14px;
            color: #333;
        }
        .container {
            max-width: 700px;
            margin: auto;
            padding: 15px;
        }
        img.logo {
            width: 100px;
            margin: 15px auto;
            display: block;
        }
        h2 {
            margin-top: 20px;
            font-size: 16px;
            color: #333;
        }

        /* Store */
        .store-container {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            gap: 10px;
        }
        .store-box {
            flex: 1;
            background: #fff;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
        }
        .store-box img { width: 120px; margin-bottom: 10px; }
        .store-box a {
            display: block;
            margin: 5px 0;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            color: #fff;
            background: #28a745;
            transition: opacity 0.2s;
        }
        .store-box a:hover { opacity: 0.85; }

        /* Web sayt va telefon tugmalari */
        .link-btn {
            display: block;
            margin: 6px auto;
            padding: 12px 16px;
            width: 80%;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            color: #fff;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s, opacity 0.2s;
            text-align: center;
        }
        .link-btn:hover { transform: scale(1.02); opacity: 0.9; }
        .contact-btn {
            display: inline-block;
            margin: 5px;
            background: #FF6833;
            color: #000;
            padding: 12px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
            transition: opacity 0.2s;
        }
        .contact-btn:hover { opacity: 0.85; }

        /* ===== VIDEO SECTION ===== */
        .video-section {
            margin-top: 24px;
            text-align: left;
        }
        .category-label {
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 1px;
            margin: 18px 0 8px 4px;
            text-align: left;
        }
        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .video-card {
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: #333;
            display: block;
        }
        .video-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(0,0,0,0.14);
        }
        .video-thumb {
            position: relative;
            padding-top: 56.25%;
            background: #e9ecef;
            overflow: hidden;
        }
        .video-thumb img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .play-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.2);
            transition: background 0.2s;
        }
        .video-card:hover .play-overlay {
            background: rgba(0,0,0,0.35);
        }
        .play-circle {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.92);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .play-circle svg {
            width: 18px; height: 18px;
            fill: #007bff;
            margin-left: 2px;
        }
        .video-info {
            padding: 8px 10px;
        }
        .video-title {
            font-size: 13px;
            font-weight: bold;
            line-height: 1.3;
            margin-bottom: 2px;
        }
        .video-desc {
            font-size: 11px;
            color: #888;
            line-height: 1.3;
        }
        .attachment-btn {
            display: inline-block;
            margin: 4px 8px 8px;
            padding: 4px 10px;
            border-radius: 6px;
            background: #f0f0f0;
            color: #555;
            font-size: 11px;
            text-decoration: none;
        }
        .attachment-btn:hover { background: #e0e0e0; }

        /* Loading & empty */
        .loading {
            text-align: center;
            padding: 30px;
            color: #888;
        }
        .spinner {
            display: inline-block;
            width: 28px; height: 28px;
            border: 3px solid #e9ecef;
            border-top-color: #007bff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            width: 100%;
            max-width: 640px;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
        }
        .modal-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            border-bottom: 1px solid #eee;
        }
        .modal-top h3 { font-size: 15px; margin: 0; }
        .modal-close {
            width: 30px; height: 30px;
            border-radius: 50%;
            border: none;
            background: #f0f0f0;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-close:hover { background: #e0e0e0; }
        .modal-video {
            position: relative;
            padding-top: 56.25%;
        }
        .modal-video iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }

        /* Hidden sections until data loads */
        .dynamic-section { display: none; }

        @media (max-width: 480px) {
            .video-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
            .video-title { font-size: 12px; }
            .video-info { padding: 6px 8px; }
            .container { padding: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://raw.githubusercontent.com/Ikhtiyor-s/Nonbor/main/nonbor_logo.png" alt="NonBor Logo" class="logo">

    <!-- Sarlavha -->
    <h2>📘 Nonbor qo'llanmasi</h2>

    <!-- VIDEO DARSLIKLAR -->
    <div class="video-section" id="videoSection">
        <div class="loading" id="videoLoading">
            <div class="spinner"></div>
            <p style="margin-top: 8px;">Yuklanmoqda...</p>
        </div>
    </div>

    <!-- Ilovani yuklash (dinamik) -->
    <div id="appSection" class="dynamic-section"></div>

    <!-- Web saytlar (dinamik) -->
    <div id="websiteSection" class="dynamic-section"></div>

    <!-- Boshqa havolalar (dinamik) -->
    <div id="otherLinksSection" class="dynamic-section"></div>

    <!-- Telefon raqamlar (dinamik) -->
    <div id="phoneSection" class="dynamic-section"></div>
</div>

<!-- Video Modal -->
<div class="modal-overlay" id="videoModal">
    <div class="modal-box">
        <div class="modal-top">
            <h3 id="modalTitle">Video</h3>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-video">
            <iframe id="modalFrame" allowfullscreen></iframe>
        </div>
    </div>
</div>

<script>
function getYouTubeId(url) {
    var m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|shorts\/))([^?&/#]+)/);
    return m ? m[1] : null;
}

function getThumb(url) {
    var id = getYouTubeId(url);
    return id ? 'https://img.youtube.com/vi/' + id + '/mqdefault.jpg' : '';
}

function openModal(title, url) {
    var id = getYouTubeId(url);
    if (!id) { window.open(url, '_blank'); return; }
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalFrame').src = 'https://www.youtube.com/embed/' + id + '?autoplay=1';
    document.getElementById('videoModal').classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('videoModal').classList.remove('active');
    document.getElementById('modalFrame').src = '';
    document.body.style.overflow = '';
}

document.getElementById('videoModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
});

function esc(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// ===== VIDEO RENDER =====
function renderVideos(categories, videos) {
    var section = document.getElementById('videoSection');
    var loading = document.getElementById('videoLoading');

    var activeCats = categories.filter(function(c) { return c.is_active; })
        .sort(function(a, b) { return a.sort_order - b.sort_order; });
    var activeVideos = videos.filter(function(v) { return v.is_active; });

    if (activeVideos.length === 0) { if (loading) loading.innerHTML = ''; return; }

    var grouped = {};
    activeVideos.forEach(function(v) {
        var cat = v.category || 'boshqa';
        if (!grouped[cat]) grouped[cat] = [];
        grouped[cat].push(v);
    });

    var html = '';
    activeCats.forEach(function(cat) {
        if (!grouped[cat.slug]) return;
        var items = grouped[cat.slug].sort(function(a, b) { return a.sort_order - b.sort_order; });
        var label = (cat.emoji ? cat.emoji + ' ' : '') + esc(cat.name);

        html += '<div class="category-label">' + label + '</div>';
        html += '<div class="video-grid">';
        items.forEach(function(v) {
            var thumb = getThumb(v.video_url);
            var attachIcon = v.attachment_url
                ? (v.attachment_url.match(/\.(jpg|jpeg|png|webp|gif)$/i) ? '🖼' : '📄')
                : '';
            html += '<a class="video-card" href="javascript:void(0)" onclick="openModal(\'' +
                esc(v.title).replace(/'/g, "\\'") + "', '" + v.video_url.replace(/'/g, "\\'") + "')\">" +
                '<div class="video-thumb">' +
                (thumb ? '<img src="' + thumb + '" alt="' + esc(v.title) + '">' : '') +
                '<div class="play-overlay"><div class="play-circle">' +
                '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>' +
                '</div></div></div>' +
                '<div class="video-info">' +
                '<div class="video-title">' + esc(v.title) + '</div>' +
                (v.description ? '<div class="video-desc">' + esc(v.description) + '</div>' : '') +
                '</div>' +
                (v.attachment_url
                    ? '<a class="attachment-btn" href="' + v.attachment_url + '" target="_blank" onclick="event.stopPropagation()">' + attachIcon + ' Qo\'llanma</a>'
                    : '') +
                '</a>';
        });
        html += '</div>';
    });

    if (loading) loading.remove();
    section.innerHTML += html;
}

// ===== BIO LINKS RENDER =====
function renderBioLinks(links) {
    if (!links || links.length === 0) return;

    var active = links.filter(function(l) { return l.is_active; })
        .sort(function(a, b) { return a.sort_order - b.sort_order; });

    // Guruhlab olish
    var appstore = active.filter(function(l) { return l.link_type === 'appstore'; });
    var playmarket = active.filter(function(l) { return l.link_type === 'playmarket'; });
    var websites = active.filter(function(l) { return l.link_type === 'website'; });
    var phones = active.filter(function(l) { return l.link_type === 'phone'; });
    var others = active.filter(function(l) {
        return ['telegram', 'youtube', 'drive', 'instagram', 'other'].indexOf(l.link_type) >= 0;
    });

    // === ILOVALAR ===
    if (appstore.length > 0 || playmarket.length > 0) {
        var appHtml = '<h2 style="margin-top:20px;">⬇️ Ilovani yuklab olish</h2>';
        appHtml += '<div class="store-container">';

        if (appstore.length > 0) {
            appHtml += '<div class="store-box">';
            appHtml += '<img src="https://raw.githubusercontent.com/Ikhtiyor-s/Nonbor/main/appstore.png" alt="App Store">';
            appstore.forEach(function(l) {
                appHtml += '<a href="' + l.url + '" target="_blank">' + (l.emoji || '📱') + ' ' + esc(l.title) + '</a>';
            });
            appHtml += '</div>';
        }

        if (playmarket.length > 0) {
            appHtml += '<div class="store-box">';
            appHtml += '<img src="https://raw.githubusercontent.com/Ikhtiyor-s/Nonbor/main/playmarket.png" alt="Play Market">';
            playmarket.forEach(function(l) {
                appHtml += '<a href="' + l.url + '" target="_blank">' + (l.emoji || '📱') + ' ' + esc(l.title) + '</a>';
            });
            appHtml += '</div>';
        }

        appHtml += '</div>';
        var appSection = document.getElementById('appSection');
        appSection.innerHTML = appHtml;
        appSection.style.display = 'block';
    }

    // === WEB SAYTLAR ===
    if (websites.length > 0) {
        var webHtml = '<h2 style="margin-top:20px;">🌐 Web saytlar</h2>';
        webHtml += '<div class="store-container" style="margin-top:10px;">';
        websites.forEach(function(l) {
            webHtml += '<div class="store-box">';
            webHtml += '<div style="font-size:36px;margin-bottom:8px;">' + (l.emoji || '🌐') + '</div>';
            webHtml += '<a href="' + l.url + '" target="_blank">🌐 ' + esc(l.title) + '</a>';
            webHtml += '</div>';
        });
        webHtml += '</div>';
        var websiteSection = document.getElementById('websiteSection');
        websiteSection.innerHTML = webHtml;
        websiteSection.style.display = 'block';
    }

    // === BOSHQA HAVOLALAR (telegram, youtube, drive, instagram, other) ===
    if (others.length > 0) {
        var otherHtml = '<h2 style="margin-top:20px;">🔗 Foydali havolalar</h2>';
        var colorMap = {
            blue: '#007bff', green: '#28a745', purple: '#8B5CF6',
            yellow: '#F59E0B', red: '#dc3545', gray: '#6c757d'
        };
        others.forEach(function(l) {
            var bg = colorMap[l.color_theme] || '#007bff';
            otherHtml += '<a class="link-btn" href="' + l.url + '" target="_blank" style="background:' + bg + ';">';
            otherHtml += (l.emoji || '🔗') + ' ' + esc(l.title);
            if (l.subtitle) otherHtml += '<br><span style="font-size:11px;font-weight:normal;opacity:0.85;">' + esc(l.subtitle) + '</span>';
            otherHtml += '</a>';
        });
        var otherSection = document.getElementById('otherLinksSection');
        otherSection.innerHTML = otherHtml;
        otherSection.style.display = 'block';
    }

    // === TELEFON RAQAMLAR ===
    if (phones.length > 0) {
        var phoneHtml = '<h2 style="margin-top:20px;">📞 Murojaat uchun telefon</h2><div style="margin-top:14px;">';
        phones.forEach(function(l) {
            var tel = l.url.replace(/\s/g, '');
            if (tel.indexOf('tel:') !== 0) tel = 'tel:' + tel;
            var displayNum = l.url.replace(/\s/g, '');
            if (displayNum.indexOf('tel:') === 0) displayNum = displayNum.substring(4);
            phoneHtml += '<a href="' + tel + '" class="contact-btn">' + (l.emoji || '📲') + ' ' + esc(displayNum) + '</a>';
        });
        phoneHtml += '</div>';
        var phoneSection = document.getElementById('phoneSection');
        phoneSection.innerHTML = phoneHtml;
        phoneSection.style.display = 'block';
    }
}

// ===== LOAD DATA =====
async function loadData() {
    var loading = document.getElementById('videoLoading');
    try {
        var resp = await fetch('./data.json?v=' + Date.now());
        if (!resp.ok) throw new Error('data.json topilmadi');
        var data = await resp.json();

        // Videolar
        renderVideos(data.categories || [], data.videos || []);

        // Bio havolalar
        if (data.bio && data.bio.links) {
            renderBioLinks(data.bio.links);
        }
    } catch (err) {
        if (loading) loading.innerHTML = '';
        console.log('data.json xatolik:', err.message);
    }
}

loadData();
</script>

</body>
</html>
